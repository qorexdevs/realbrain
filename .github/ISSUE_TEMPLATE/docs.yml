name: Documentation improvement
description: Improve README, guides, examples, or launch docs
title: "Docs: "
labels: [documentation, needs-triage]
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
      placeholder: README quickstart, architecture guide, MCP example, etc.
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: Suggested change
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Why it helps
